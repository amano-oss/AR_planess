<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#startUI {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:100;
}

#controls {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
}

button {
  padding:12px;
  margin:5px;
}
</style>
</head>

<body>

<div id="startUI">
  <h2>カメラを床に向けてください</h2>
  <button onclick="fixFloor()">OK</button>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- 常に見える仮グリッド -->
  <a-entity id="floor">

    <a-plane
      id="grid"
      rotation="-90 0 0"
      width="10"
      height="10"
      material="color:#ff00ff; opacity:0.3; wireframe:true">
    </a-plane>

    <a-entity id="model"
      visible="false"
      position="0 0 0"
      scale="1 1 1">
    </a-entity>

  </a-entity>

  <a-camera id="cam"></a-camera>

</a-scene>

<div id="controls">
  <button onclick="placeModel()">P</button>
  <button onclick="rotate(-5)">←</button>
  <button onclick="rotate(5)">→</button>
  <button onclick="scaleUp()">＋</button>
  <button onclick="scaleDown()">－</button>
</div>

<script>

let rotation = 0;
let scale = 1;

function fixFloor(){

  document.getElementById("startUI").style.display = "none";

  const cam = document.getElementById("cam");
  const floor = document.getElementById("floor");

  const pos = cam.object3D.position;
  const rot = cam.object3D.rotation;

  floor.object3D.position.set(
    pos.x,
    pos.y - 1.0,
    pos.z - 2.0
  );

  floor.object3D.rotation.set(0, rot.y, 0);
}

function placeModel(){

  const model = document.getElementById("model");

  if(model.getAttribute("visible")) return;

  const url = "https://amano-oss.github.io/AR_planess/assets/project.glb";

  model.setAttribute("gltf-model", url);
  model.setAttribute("visible", true);
}

function rotate(val){
  rotation += val;
  document.getElementById("model")
    .setAttribute("rotation", "0 " + rotation + " 0");
}

function scaleUp(){
  scale += 0.1;
  updateScale();
}

function scaleDown(){
  scale -= 0.1;
  updateScale();
}

function updateScale(){
  document.getElementById("model")
    .setAttribute("scale", scale + " " + scale + " " + scale);
}

</script>

</body>
</html>
