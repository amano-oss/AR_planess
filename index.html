<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<style>
body { margin:0; overflow:hidden; }

#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px;
  font-size: 14px;
}

#controls {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
}

button {
  padding: 10px;
  margin: 3px;
}
</style>
</head>

<body>

<!-- カメラ -->
<video id="video" autoplay playsinline style="width:100%"></video>
<canvas id="canvas" style="display:none;"></canvas>

<!-- AR空間 -->
<a-scene embedded>

  <!-- グリッド -->
  <a-grid id="grid" visible="false" position="0 -1 -3" width="10" height="10" segments="10"></a-grid>

  <!-- モデル -->
  <a-entity id="model" position="0 0 -3"></a-entity>

  <a-camera></a-camera>
</a-scene>

<!-- UI -->
<div id="ui">モデルQRをスキャンしてください</div>

<div id="controls" style="display:none;">
  <button onclick="rotate(-10)">←回転</button>
  <button onclick="rotate(10)">回転→</button><br>
  <button onclick="scaleUp()">拡大</button>
  <button onclick="scaleDown()">縮小</button><br>
  <button onclick="move(0.2)">前</button>
  <button onclick="move(-0.2)">後</button><br>
  <button onclick="fix()">設営開始（固定）</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>
const video = document.getElementById("video");
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => video.srcObject = stream);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let model = document.getElementById("model");
let grid = document.getElementById("grid");
let lastQR = "";

let rotation = 0;
let scale = 1;
let positionZ = -3;

setInterval(() => {

  if (!video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, canvas.width, canvas.height);

  if (code) {

    if (code.data === lastQR) return;
    lastQR = code.data;

    if (code.data === "project") {

      // モデル読み込み
      model.setAttribute(
        "gltf-model",
        "https://cdn.jsdelivr.net/gh/amano-oss/AR_planess/assets/project.glb"
      );

      // グリッド表示
      grid.setAttribute("visible", true);

      // UI切替
      document.getElementById("ui").innerText = "位置調整してください";
      document.getElementById("controls").style.display = "block";
    }
  }

}, 300);

// ===== 操作系 =====

function rotate(val) {
  rotation += val;
  model.setAttribute("rotation", "0 " + rotation + " 0");
}

function scaleUp() {
  scale += 0.1;
  model.setAttribute("scale", scale + " " + scale + " " + scale);
}

function scaleDown() {
  scale -= 0.1;
  model.setAttribute("scale", scale + " " + scale + " " + scale);
}

function move(val) {
  positionZ += val;
  model.setAttribute("position", "0 0 " + positionZ);
}

// ===== 固定 =====
function fix() {
  document.getElementById("ui").innerText = "設営完了（固定）";
  document.getElementById("controls").style.display = "none";
}
</script>

</body>
</html>
