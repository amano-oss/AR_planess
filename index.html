<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }

#startUI {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
}

#controls {
  position:fixed;
  bottom:20px;
  left:10px;
  z-index:10;
}

button{
  padding:12px;
  margin:5px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 初期 -->
<div id="startUI">
  <button onclick="fixFloor()">OK（床を固定）</button>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled:false;">

  <a-entity id="floor">

    <!-- グリッド -->
    <a-plane 
      id="grid"
      rotation="-90 0 0"
      width="10"
      height="10"
      material="color:#ff00ff; opacity:0.4; wireframe:true">
    </a-plane>

    <!-- モデル -->
    <a-entity id="model" visible="false"></a-entity>

  </a-entity>

  <a-camera id="cam"></a-camera>

</a-scene>

<div id="controls">
  <button onclick="placeModel()">P（モデル表示）</button>
</div>

<script>

let floorFixed = false;
let modelLoaded = false;

// ■ 床固定
function fixFloor(){

  if(floorFixed) return;

  const floor = document.getElementById("floor");

  // ★絶対座標（安定）
  floor.object3D.position.set(0, -1.2, -2);

  document.getElementById("startUI").style.display = "none";

  floorFixed = true;
}

// ■ モデル出現
function placeModel(){

  if(!floorFixed){
    alert("先に床を固定してください");
    return;
  }

  if(modelLoaded) return;

  const model = document.getElementById("model");

  console.log("モデル読み込み開始");

  model.setAttribute(
    "gltf-model",
    "https://raw.githubusercontent.com/amano-oss/AR_planess/main/assets/project.glb"
  );

  // ★必ず見える位置
  model.setAttribute("position", "0 0 -1");

  // ★確認しやすいサイズ
  model.setAttribute("scale", "2 2 2");

  model.setAttribute("visible", true);

  model.addEventListener("model-loaded", () => {
    console.log("読み込み成功");
    modelLoaded = true;
  });

  model.addEventListener("model-error", () => {
    alert("モデル読み込み失敗");
  });
}

</script>

</body>
</html>
