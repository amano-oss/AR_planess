<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }

.ui {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 999;
}

button {
  width: 64px;
  height: 64px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  background: rgba(255,255,255,0.9);
}
</style>
</head>

<body>

<a-scene embedded arjs="sourceType:webcam; debugUIEnabled:false;">

  <!-- 20cmマーカー -->
  <a-marker preset="hiro" id="marker" size="0.2">

    <!-- 床グリッド -->
    <a-entity id="grid"
      visible="false"
      geometry="primitive: plane; width: 10; height: 10"
      rotation="-90 0 0"
      material="color: magenta; wireframe: true; opacity: 0.6">
    </a-entity>

    <!-- モデル -->
    <a-entity id="model"
      visible="false"
      gltf-model="assets/project.glb"
      position="0 0 0"
      scale="0.01 0.01 0.01">
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<!-- UI -->
<div class="ui">
  <button onclick="spawnModel()">P</button>
  <button onclick="rotate(-5)">↺</button>
  <button onclick="rotate(5)">↻</button>
  <button onclick="scaleUp()">＋</button>
  <button onclick="scaleDown()">－</button>
  <button onclick="fixModel()">固定</button>
</div>

<script>

let model = document.querySelector("#model");
let grid = document.querySelector("#grid");
let marker = document.querySelector("#marker");

let placed = false;
let fixed = false;

// マーカー検知で床グリッドON
marker.addEventListener("markerFound", ()=>{
  if(!placed){
    grid.setAttribute("visible", true);
  }
});

// モデル出現
function spawnModel(){
  if(placed || fixed) return;

  model.setAttribute("visible", true);
  placed = true;
}

// 回転
function rotate(val){
  if(fixed) return;

  let r = model.getAttribute("rotation");
  r.y += val;
  model.setAttribute("rotation", r);
}

// サイズ
function scaleUp(){
  if(fixed) return;

  let s = model.getAttribute("scale");
  s.x *= 1.1;
  s.y *= 1.1;
  s.z *= 1.1;
  model.setAttribute("scale", s);
}

function scaleDown(){
  if(fixed) return;

  let s = model.getAttribute("scale");
  s.x *= 0.9;
  s.y *= 0.9;
  s.z *= 0.9;
  model.setAttribute("scale", s);
}

// 固定
function fixModel(){
  if(!placed) return;

  fixed = true;

  // グリッド消す
  grid.setAttribute("visible", false);

  alert("位置固定完了");
}

</script>

</body>
</html>
