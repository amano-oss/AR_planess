<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

#menu {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.7);
  padding: 10px;
}

button {
  display:block;
  margin:5px;
  padding:10px;
  font-size:14px;
}
</style>
</head>

<body>

<!-- カメラ -->
<video autoplay playsinline style="width:100%" id="video"></video>

<!-- AR空間 -->
<a-scene embedded>
  <a-grid id="grid" visible="false" position="0 -1 -3" width="10" height="10" segments="10"></a-grid>
  <a-entity id="model" position="0 0 -3"></a-entity>
  <a-camera></a-camera>
</a-scene>

<!-- UI -->
<div id="menu">
  <button onclick="loadModel('project.glb')">project</button>
  <button onclick="loadModel('project02.glb')">project02</button>
  <button onclick="loadModel('project03.glb')">project03</button>
  <button onclick="loadModel('project04.glb')">project04</button>
  <button onclick="loadModel('project05.glb')">project05</button>
  <button onclick="loadModel('project06.glb')">project06</button>
  <button onclick="loadModel('project07.glb')">project07</button>
  <button onclick="loadModel('project08.glb')">project08</button>
  <button onclick="loadModel('project09.glb')">project09</button>
  <button onclick="loadModel('project10.glb')">project10</button>
</div>

<!-- 操作UI -->
<div id="controls" style="position:fixed;bottom:10px;left:10px;z-index:10;display:none;">
  <button onclick="rotate(-10)">←</button>
  <button onclick="rotate(10)">→</button>
  <button onclick="scaleUp()">＋</button>
  <button onclick="scaleDown()">－</button>
  <button onclick="move(0.2)">前</button>
  <button onclick="move(-0.2)">後</button>
  <button onclick="fix()">固定</button>
</div>

<script>
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => video.srcObject = stream);

let model = document.getElementById("model");
let grid = document.getElementById("grid");

let rotation = 0;
let scale = 1;
let positionZ = -3;

// ===== モデル読み込み =====
function loadModel(file) {

  const url = "https://cdn.jsdelivr.net/gh/amano-oss/AR_planess/assets/" + file;

  model.setAttribute("gltf-model", url);
  model.setAttribute("scale", "1 1 1");
  model.setAttribute("position", "0 0 -3");

  grid.setAttribute("visible", true);

  document.getElementById("controls").style.display = "block";
}

// ===== 操作 =====
function rotate(val) {
  rotation += val;
  model.setAttribute("rotation", "0 " + rotation + " 0");
}

function scaleUp() {
  scale += 0.1;
  model.setAttribute("scale", scale + " " + scale + " " + scale);
}

function scaleDown() {
  scale -= 0.1;
  model.setAttribute("scale", scale + " " + scale + " " + scale);
}

function move(val) {
  positionZ += val;
  model.setAttribute("position", "0 0 " + positionZ);
}

// ===== 固定 =====
function fix() {
  document.getElementById("menu").style.display = "none";
}
</script>

</body>
</html>
