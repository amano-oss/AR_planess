<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#menu {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}

#controls {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
}

button {
  padding:10px;
  margin:3px;
}
</style>
</head>

<body>

<a-scene embedded arjs>

  <a-marker preset="hiro">

    <!-- グリッド -->
    <a-grid position="0 0 0" width="2" height="2" segments="10"></a-grid>

    <!-- モデル -->
    <a-entity id="model"
      position="0 0 0"
      scale="0.01 0.01 0.01"
      rotation="0 0 0">
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<div id="menu">
  <button onclick="loadModel()">project</button>
</div>

<div id="controls">
  <button onclick="rotate(-10)">←</button>
  <button onclick="rotate(10)">→</button>
  <button onclick="scaleUp()">＋</button>
  <button onclick="scaleDown()">－</button>
  <button onclick="fix()">固定</button>
</div>

<script>

let rotation = 0;
let scale = 0.01;

function loadModel() {
  const url = "https://amano-oss.github.io/AR_planess/assets/project.glb";
  const model = document.getElementById("model");
  model.setAttribute("gltf-model", url);
}

function rotate(val){
  rotation += val;
  document.getElementById("model")
    .setAttribute("rotation", "0 " + rotation + " 0");
}

function scaleUp(){
  scale += 0.005;
  document.getElementById("model")
    .setAttribute("scale", scale + " " + scale + " " + scale);
}

function scaleDown(){
  scale -= 0.005;
  document.getElementById("model")
    .setAttribute("scale", scale + " " + scale + " " + scale);
}

function fix(){
  alert("設営位置を固定しました");
}

</script>

</body>
</html>
