<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body style="margin:0">

<!-- カメラ -->
<video id="video" autoplay playsinline style="width:100%"></video>
<canvas id="canvas" style="display:none;"></canvas>

<!-- 3D表示 -->
<a-scene embedded>
  <a-entity id="model" position="0 0 -3"></a-entity>
  <a-camera></a-camera>
</a-scene>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  video.srcObject = stream;
});

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let lastQR = "";

setInterval(() => {

  if (!video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, canvas.width, canvas.height);

  if (code) {

    // 同じQRの連続読み取り防止
    if (code.data === lastQR) return;
    lastQR = code.data;

    console.log("QR:", code.data);

    let modelUrl = "";

    // ===== Drive URL対応 =====
    if (code.data.includes("drive.google.com")) {

      try {
        let id = code.data.split("/d/")[1].split("/")[0];

        modelUrl = "https://drive.googleusercontent.com/uc?id=" + id;

      } catch (e) {
        console.log("URL解析エラー");
      }
    }

    // ===== モデル表示 =====
    if (modelUrl) {
      const model = document.getElementById("model");
      model.setAttribute("gltf-model", modelUrl);
      model.setAttribute("scale", "1 1 1");

      console.log("モデル読込:", modelUrl);
    }
  }

}, 300);
</script>

</body>
</html>
