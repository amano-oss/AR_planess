<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#ui {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
}

button {
  width:60px;
  height:60px;
  margin:3px;
  font-size:18px;
}
</style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-entity id="model"
    position="0 0 -1"
    rotation="0 0 0">
  </a-entity>

  <a-camera></a-camera>

</a-scene>

<div id="ui">

  <button onclick="loadModel()">P</button><br>

  <!-- 微調整 -->
  <button id="scaleUp">＋</button>
  <button id="scaleDown">－</button>

</div>

<script>

let scale = 1;  // ←ここが重要（まず1で出す）

const model = document.getElementById("model");

function loadModel(){

  model.setAttribute("gltf-model",
    "https://amano-oss.github.io/AR_planess/assets/project.glb"
  );

  model.setAttribute("scale", `${scale} ${scale} ${scale}`);
}

// 長押し
function hold(action){
  return setInterval(()=>{

    if(action==="scaleUp") scale += 0.05;
    if(action==="scaleDown") scale -= 0.05;

    update();

  },100);
}

function update(){
  model.setAttribute("scale", `${scale} ${scale} ${scale}`);
}

let timers = {};

["scaleUp","scaleDown"].forEach(id=>{

  const btn = document.getElementById(id);

  btn.addEventListener("touchstart", e=>{
    e.preventDefault();
    timers[id] = hold(id);
  });

  btn.addEventListener("touchend", ()=>{
    clearInterval(timers[id]);
  });

});

</script>

</body>
</html>
