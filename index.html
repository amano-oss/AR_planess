<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; }

#menu {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.7);
  padding: 10px;
}

button {
  display:block;
  margin:5px;
  padding:10px;
}

#debug {
  position: fixed;
  bottom: 10px;
  left: 10px;
  color:white;
  background: rgba(0,0,0,0.5);
  padding:5px;
}
</style>
</head>

<body>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true"
  device-orientation-permission-ui="enabled: true"
  arjs="sourceType: webcam; debugUIEnabled: false;"
>

  <!-- ライト -->
  <a-entity light="type: ambient; intensity: 1"></a-entity>
  <a-entity light="type: directional; intensity: 1" position="1 1 1"></a-entity>

  <!-- モデル -->
  <a-entity id="model" position="0 0 -1"></a-entity>

  <a-camera></a-camera>

</a-scene>

<div id="menu">
  <button onclick="loadModel()">project</button>
</div>

<div id="debug">待機中</div>

<script>

function loadModel() {

  const url = "https://amano-oss.github.io/AR_planess/assets/project.glb";

  document.getElementById("debug").innerText = url;

  const model = document.getElementById("model");

  model.removeAttribute("gltf-model");

  model.setAttribute("gltf-model", url);

  // 強制表示設定
  model.setAttribute("scale", "0.01 0.01 0.01");
  model.setAttribute("position", "0 0 -1");
  model.setAttribute("rotation", "0 0 0");
}

</script>

</body>
</html>
