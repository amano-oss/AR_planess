<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }

#startUI {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:100;
}

#controls {
  position:fixed;
  bottom:20px;
  left:10px;
  z-index:10;
}

button{
  padding:12px;
  margin:4px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="startUI">
  <h2>床に向けてください</h2>
  <button onclick="start()">OK</button>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled:false;">

  <a-entity id="floor"></a-entity>

  <a-entity id="model"
    visible="false"
    position="0 0 0"
    scale="1 1 1">
  </a-entity>

  <a-camera></a-camera>

</a-scene>

<div id="controls">
  <button onclick="place()">P</button>
</div>

<script>

let ready = false;

// ===== グリッド生成 =====
function createGrid(){

  const floor = document.getElementById("floor");

  const size = 20; // 20m
  const stepFine = 0.1; // 10cm
  const stepMajor = 1; // 1m

  for(let i = -size/2; i <= size/2; i += stepFine){

    let isMajor = Math.abs(i % stepMajor) < 0.01;

    let color = isMajor ? "#ff00ff" : "#ff00ff";
    let opacity = isMajor ? 1.0 : 0.3;

    // 縦線
    let line1 = document.createElement("a-entity");
    line1.setAttribute("line", {
      start: `${i} 0 ${-size/2}`,
      end: `${i} 0 ${size/2}`,
      color: color,
      opacity: opacity
    });

    // 横線
    let line2 = document.createElement("a-entity");
    line2.setAttribute("line", {
      start: `${-size/2} 0 ${i}`,
      end: `${size/2} 0 ${i}`,
      color: color,
      opacity: opacity
    });

    floor.appendChild(line1);
    floor.appendChild(line2);
  }

  // 床回転
  floor.setAttribute("rotation", "-90 0 0");
}

// ===== 開始 =====
function start(){

  document.getElementById("startUI").style.display = "none";

  const floor = document.getElementById("floor");

  floor.object3D.position.set(0, -1.2, -2);

  createGrid();

  ready = true;
}

// ===== モデル =====
function place(){

  if(!ready){
    alert("先に床を確定してください");
    return;
  }

  const model = document.getElementById("model");

  model.setAttribute("gltf-model",
  "https://cdn.jsdelivr.net/gh/amano-oss/AR_planess@main/assets/project.glb");

  model.setAttribute("visible", true);
}

</script>

</body>
</html>
