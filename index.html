<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<video id="video" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="ui" style="position:absolute; bottom:20px; width:100%; text-align:center; display:none;">
  <button onclick="scaleUp()">＋</button>
  <button onclick="scaleDown()">－</button>
  <button onclick="fix()">確定</button>
</div>

<script>

let state = 0;
let model;
let scale = 1;

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => {
  video.srcObject = stream;
});

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

setInterval(() => {
  if (!video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, canvas.width, canvas.height);

  if (code) {
    if (state === 0) {
      state = 1;
    } else if (state === 1) {
      createModel();
      document.getElementById("ui").style.display = "block";
      state = 2;
    }
  }
}, 500);

function createModel() {

  if (model) return;

  const scene = document.createElement("a-scene");
  scene.setAttribute("embedded", "");

  const entity = document.createElement("a-entity");

  entity.setAttribute("gltf-model",
    "https://drive.googleusercontent.com/uc?id=1mFwTp993am-MdYAPgBvgVfl-9685iSM7");

  entity.setAttribute("position", "0 0 -2");
  entity.setAttribute("scale", "1 1 1");

  scene.appendChild(entity);

  const camera = document.createElement("a-entity");
  camera.setAttribute("camera", "");
  scene.appendChild(camera);

  document.body.appendChild(scene);

  model = entity;
}

function scaleUp() {
  scale += 0.2;
  model.setAttribute("scale", `${scale} ${scale} ${scale}`);
}

function scaleDown() {
  scale -= 0.2;
  model.setAttribute("scale", `${scale} ${scale} ${scale}`);
}

function fix() {
  alert("設営完了");
}

</script>

</body>
</html>
