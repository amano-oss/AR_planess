<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#ui {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
}

button {
  width:60px;
  height:60px;
  margin:3px;
}
</style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- グリッド（基準） -->
  <a-entity id="grid"
    geometry="primitive: plane; width:1; height:1"
    material="color: white; opacity: 0.3; wireframe:true"
    rotation="-90 0 0"
    position="0 0 -1">
  </a-entity>

  <!-- モデル -->
  <a-entity id="model"></a-entity>

  <a-camera></a-camera>

</a-scene>

<div id="ui">

  <!-- グリッド調整 -->
  <button id="gUp">↑</button>
  <button id="gDown">↓</button><br>
  <button id="gLeft">←</button>
  <button id="gRight">→</button><br>
  <button id="gForward">前</button>
  <button id="gBack">後</button><br>

  <button id="gScaleUp">＋</button>
  <button id="gScaleDown">－</button><br>

  <button onclick="fixGrid()">固定</button><br>

  <!-- モデル -->
  <button onclick="loadModel()">P</button>

</div>

<script>

let gPos = {x:0, y:0, z:-1};
let gScale = 1;
let fixed = false;

const grid = document.getElementById("grid");
const model = document.getElementById("model");

// ===== グリッド操作 =====

function updateGrid(){
  grid.setAttribute("position", `${gPos.x} ${gPos.y} ${gPos.z}`);
  grid.setAttribute("scale", `${gScale} ${gScale} ${gScale}`);
}

function hold(action){
  let speed = 1;

  return setInterval(()=>{

    if(fixed) return;

    if(action==="gUp") gPos.y += 0.01 * speed;
    if(action==="gDown") gPos.y -= 0.01 * speed;

    if(action==="gLeft") gPos.x -= 0.01 * speed;
    if(action==="gRight") gPos.x += 0.01 * speed;

    if(action==="gForward") gPos.z -= 0.02 * speed;
    if(action==="gBack") gPos.z += 0.02 * speed;

    if(action==="gScaleUp") gScale += 0.02 * speed;
    if(action==="gScaleDown") gScale -= 0.02 * speed;

    updateGrid();

    speed += 0.05;

  },80);
}

let timers = {};

[
"gUp","gDown","gLeft","gRight",
"gForward","gBack",
"gScaleUp","gScaleDown"
].forEach(id=>{

  const btn = document.getElementById(id);

  btn.addEventListener("touchstart", e=>{
    e.preventDefault();
    timers[id] = hold(id);
  });

  btn.addEventListener("touchend", ()=>{
    clearInterval(timers[id]);
  });

});

// ===== 固定 =====

function fixGrid(){
  fixed = true;
  alert("グリッド固定完了");
}

// ===== モデル呼び出し =====

function loadModel(){

  model.setAttribute("gltf-model",
    "https://amano-oss.github.io/AR_planess/assets/project.glb"
  );

  // グリッド上に配置
  model.setAttribute("position", gPos);
  model.setAttribute("scale", "1 1 1");

}

</script>

</body>
</html>
