<script>
let grid = document.querySelector("#grid");
let model = document.querySelector("#model");

let dragging = false;
let velocity = {x:0,z:0};
let lastTouch = null;

let mode = "grid"; 
// grid = 床調整
// model = モデル調整
// fixed = 完全固定

/* --- スタート --- */
function startAR(){
  document.getElementById("startUI").style.display="none";
  grid.setAttribute("visible", true);
}

/* --- ドラッグ --- */
window.addEventListener("touchstart", e=>{
  if(mode === "fixed") return;
  dragging = true;
  lastTouch = e.touches[0];
});

window.addEventListener("touchmove", e=>{
  if(!dragging || mode === "fixed") return;

  let t = e.touches[0];
  let dx = (t.clientX - lastTouch.clientX) * 0.01;
  let dz = (t.clientY - lastTouch.clientY) * 0.01;

  velocity.x = dx;
  velocity.z = dz;

  if(mode === "grid"){
    move(grid, dx, dz);
  } else if(mode === "model"){
    move(model, dx, dz);
  }

  lastTouch = t;
});

window.addEventListener("touchend", ()=>{
  dragging = false;
});

/* --- 慣性 --- */
setInterval(()=>{
  if(!dragging && mode !== "fixed"){
    velocity.x *= 0.9;
    velocity.z *= 0.9;

    if(Math.abs(velocity.x)>0.001){
      if(mode==="grid") move(grid, velocity.x, velocity.z);
      if(mode==="model") move(model, velocity.x, velocity.z);
    }
  }
},16);

/* --- 共通移動 --- */
function move(target, dx, dz){
  let p = target.object3D.position;
  p.x += dx;
  p.z += dz;
}

/* --- 回転 --- */
let holdTimer=null;

function holdRotate(dir){
  holdTimer = setInterval(()=>{
    let target = (mode==="model") ? model : grid;
    target.object3D.rotation.y += dir * 0.02;
  },16);
}

function stopHold(){
  clearInterval(holdTimer);
}

/* --- スケール --- */
function scaleUp(){
  let target = (mode==="model") ? model : grid;
  let s = target.object3D.scale;
  s.x *= 1.1;
  s.z *= 1.1;
}

function scaleDown(){
  let target = (mode==="model") ? model : grid;
  let s = target.object3D.scale;
  s.x *= 0.9;
  s.z *= 0.9;
}

/* --- グリッド確定 --- */
function fixPosition(){
  mode = "grid-fixed";
  alert("床位置確定 → Pでモデル表示");
}

/* --- モデル出現 --- */
function spawnModel(){
  if(mode !== "grid-fixed"){
    alert("先に床を固定してください");
    return;
  }

  model.setAttribute("visible", true);

  let gp = grid.object3D.position;
  model.object3D.position.set(gp.x, 0, gp.z);

  mode = "model"; // ←ここが重要
}

/* --- 最終固定 --- */
function finalFix(){
  mode = "fixed";
  alert("完全固定しました");
}
</script>
