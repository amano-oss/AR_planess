<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#ui {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
}

button {
  width:65px;
  height:65px;
  margin:3px;
}
</style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- ワールド固定用 -->
  <a-entity id="world"></a-entity>

  <!-- カメラ -->
  <a-camera id="cam"></a-camera>

</a-scene>

<div id="ui">
  <button onclick="placeGrid()">床</button>
  <button onclick="fixGrid()">固定</button><br>
  <button id="gScaleUp">＋</button>
  <button id="gScaleDown">－</button><br>
  <button onclick="loadModel()">P</button>
</div>

<script>

const cam = document.getElementById("cam");
const world = document.getElementById("world");

let grid = null;
let gScale = 1;
let fixed = false;

// ===== グリッド生成 =====
function createGrid(){

  const g = document.createElement("a-entity");

  const size = 5;

  for(let i=-size;i<=size;i+=0.1){

    const main = Math.abs(i % 1) < 0.001;
    const w = main ? 0.02 : 0.005;

    let v = document.createElement("a-box");
    v.setAttribute("position", `${i} 0 0`);
    v.setAttribute("depth", size*2);
    v.setAttribute("width", w);
    v.setAttribute("height", 0.001);
    v.setAttribute("color","#ff00ff");
    g.appendChild(v);

    let h = document.createElement("a-box");
    h.setAttribute("position", `0 0 ${i}`);
    h.setAttribute("width", size*2);
    h.setAttribute("depth", w);
    h.setAttribute("height", 0.001);
    h.setAttribute("color","#ff00ff");
    g.appendChild(h);
  }

  return g;
}

// ===== 床配置（重要修正）=====
function placeGrid(){

  if(fixed) return;

  if(grid) world.removeChild(grid);

  grid = createGrid();

  const camera = cam.object3D;

  // ワールド座標取得
  const pos = new THREE.Vector3();
  camera.getWorldPosition(pos);

  const dir = new THREE.Vector3(0,-1,0);
  dir.applyQuaternion(camera.quaternion);

  const target = pos.clone().add(dir.multiplyScalar(1));

  grid.object3D.position.copy(target);
  grid.object3D.rotation.set(-Math.PI/2,0,0);

  world.appendChild(grid);
}

// ===== スケール =====
function updateScale(){
  if(grid) grid.setAttribute("scale", `${gScale} ${gScale} ${gScale}`);
}

// ===== 固定 =====
function fixGrid(){
  fixed = true;
  alert("床固定OK（ワールド固定）");
}

// ===== モデル =====
function loadModel(){

  if(!grid) return;

  const model = document.createElement("a-entity");

  model.setAttribute("gltf-model",
    "https://amano-oss.github.io/AR_planess/assets/project.glb"
  );

  model.setAttribute("scale","1 1 1");

  model.object3D.position.copy(grid.object3D.position);

  world.appendChild(model);
}

// ===== 長押し =====
function hold(action){

  let speed = 1;

  return setInterval(()=>{

    if(fixed) return;

    if(action==="up") gScale += 0.02 * speed;
    if(action==="down") gScale -= 0.02 * speed;

    updateScale();

    speed += 0.05;

  },80);
}

let timers = {};

document.getElementById("gScaleUp").addEventListener("touchstart", e=>{
  e.preventDefault();
  timers.up = hold("up");
});

document.getElementById("gScaleUp").addEventListener("touchend", ()=>{
  clearInterval(timers.up);
});

document.getElementById("gScaleDown").addEventListener("touchstart", e=>{
  e.preventDefault();
  timers.down = hold("down");
});

document.getElementById("gScaleDown").addEventListener("touchend", ()=>{
  clearInterval(timers.down);
});

</script>

</body>
</html>
