<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#ui {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
}

button {
  width:65px;
  height:65px;
  margin:3px;
}
</style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-entity id="grid"></a-entity>
  <a-entity id="model"></a-entity>

  <a-camera id="cam"></a-camera>

</a-scene>

<div id="ui">
  <button onclick="initGrid()">床セット</button>
  <button onclick="fixGrid()">固定</button><br>
  <button onclick="loadModel()">P</button>
</div>

<script>

const grid = document.getElementById("grid");
const cam = document.getElementById("cam");

let gridFixed = false;

// ===== グリッド生成（蛍光ピンク）=====
function createGrid(){

  const size = 5;

  for(let i=-size;i<=size;i+=0.1){

    const main = Math.abs(i % 1) < 0.001;
    const w = main ? 0.02 : 0.005;

    let v = document.createElement("a-box");
    v.setAttribute("position", `${i} 0 0`);
    v.setAttribute("depth", size*2);
    v.setAttribute("width", w);
    v.setAttribute("height", 0.001);
    v.setAttribute("color","#ff00ff");
    grid.appendChild(v);

    let h = document.createElement("a-box");
    h.setAttribute("position", `0 0 ${i}`);
    h.setAttribute("width", size*2);
    h.setAttribute("depth", w);
    h.setAttribute("height", 0.001);
    h.setAttribute("color","#ff00ff");
    grid.appendChild(h);
  }
}
createGrid();

// ===== 床初期配置 =====
function initGrid(){

  if(gridFixed) return;

  const camera = cam.object3D;

  // 下方向ベクトル
  const down = new THREE.Vector3(0,-1,0);
  down.applyQuaternion(camera.quaternion);

  // カメラ位置
  const pos = camera.position.clone();

  // 1m下に配置
  const target = pos.clone().add(down.multiplyScalar(1));

  grid.setAttribute("position", target);
  grid.setAttribute("rotation", "-90 0 0");
}

// ===== 固定 =====
function fixGrid(){
  gridFixed = true;
  alert("床固定完了");
}

// ===== モデル =====
function loadModel(){

  document.getElementById("model").setAttribute(
    "gltf-model",
    "https://amano-oss.github.io/AR_planess/assets/project.glb"
  );

  const gpos = grid.getAttribute("position");

  document.getElementById("model").setAttribute(
    "position",
    `${gpos.x} ${gpos.y} ${gpos.z}`
  );

  document.getElementById("model").setAttribute("scale","1 1 1");
}

</script>

</body>
</html>
