<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#ui {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
}

button {
  width:65px;
  height:65px;
  margin:3px;
}
</style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- グリッド -->
  <a-entity id="grid" position="0 0 -1" rotation="-90 0 0"></a-entity>

  <!-- モデル -->
  <a-entity id="model"></a-entity>

  <a-camera></a-camera>

</a-scene>

<div id="ui">

  <!-- グリッド調整 -->
  <button id="gUp">↑</button>
  <button id="gDown">↓</button><br>
  <button id="gLeft">←</button>
  <button id="gRight">→</button><br>
  <button id="gForward">前</button>
  <button id="gBack">後</button><br>

  <button id="gScaleUp">＋</button>
  <button id="gScaleDown">－</button><br>

  <button onclick="fixGrid()">固定</button><br>

  <!-- モデル -->
  <button onclick="loadModel()">P</button><br>

  <!-- モデル操作 -->
  <button id="mLeft">←</button>
  <button id="mRight">→</button><br>
  <button id="mForward">前</button>
  <button id="mBack">後</button><br>
  <button id="rotL">⟲</button>
  <button id="rotR">⟳</button>

</div>

<script>

// ===== グリッド生成 =====
const grid = document.getElementById("grid");

function createGrid(){

  const size = 5; // 5m範囲
  const step = 0.1;

  for(let i=-size;i<=size;i+=step){

    const isMain = Math.abs(i % 1) < 0.001;

    const width = isMain ? 0.02 : 0.005;

    const color = "#ff00ff"; // 蛍光ピンク

    // 縦線
    const v = document.createElement("a-box");
    v.setAttribute("position", `${i} 0 0`);
    v.setAttribute("depth", size*2);
    v.setAttribute("width", width);
    v.setAttribute("height", 0.001);
    v.setAttribute("color", color);
    grid.appendChild(v);

    // 横線
    const h = document.createElement("a-box");
    h.setAttribute("position", `0 0 ${i}`);
    h.setAttribute("width", size*2);
    h.setAttribute("depth", width);
    h.setAttribute("height", 0.001);
    h.setAttribute("color", color);
    grid.appendChild(h);
  }
}

createGrid();

// ===== 状態 =====
let gPos = {x:0,y:0,z:-1};
let gScale = 1;
let gridFixed = false;

let mPos = {x:0,y:0,z:-1};
let rot = 0;

// ===== 更新 =====
function updateGrid(){
  grid.setAttribute("position", `${gPos.x} ${gPos.y} ${gPos.z}`);
  grid.setAttribute("scale", `${gScale} ${gScale} ${gScale}`);
}

function updateModel(){
  model.setAttribute("position", `${mPos.x} 0 ${mPos.z}`);
  model.setAttribute("rotation", `0 ${rot} 0`);
}

// ===== モデル =====
const model = document.getElementById("model");

function loadModel(){
  model.setAttribute("gltf-model",
    "https://amano-oss.github.io/AR_planess/assets/project.glb"
  );
  model.setAttribute("scale","1 1 1");
  mPos = {...gPos};
  updateModel();
}

// ===== 固定 =====
function fixGrid(){
  gridFixed = true;
  alert("床面確定（スケールロック）");
}

// ===== 長押し =====
function hold(action){

  let speed = 1;

  return setInterval(()=>{

    if(!gridFixed){
      if(action==="gUp") gPos.y += 0.01*speed;
      if(action==="gDown") gPos.y -= 0.01*speed;
      if(action==="gLeft") gPos.x -= 0.01*speed;
      if(action==="gRight") gPos.x += 0.01*speed;
      if(action==="gForward") gPos.z -= 0.02*speed;
      if(action==="gBack") gPos.z += 0.02*speed;

      if(action==="gScaleUp") gScale += 0.02*speed;
      if(action==="gScaleDown") gScale -= 0.02*speed;

      updateGrid();
    }else{
      if(action==="mLeft") mPos.x -= 0.01*speed;
      if(action==="mRight") mPos.x += 0.01*speed;
      if(action==="mForward") mPos.z -= 0.02*speed;
      if(action==="mBack") mPos.z += 0.02*speed;

      if(action==="rotL") rot -= speed;
      if(action==="rotR") rot += speed;

      updateModel();
    }

    speed += 0.05;

  },80);
}

// ===== ボタン =====
let timers={};

[
"gUp","gDown","gLeft","gRight","gForward","gBack",
"gScaleUp","gScaleDown",
"mLeft","mRight","mForward","mBack",
"rotL","rotR"
].forEach(id=>{

  const btn = document.getElementById(id);

  btn.addEventListener("touchstart", e=>{
    e.preventDefault();
    timers[id]=hold(id);
  });

  btn.addEventListener("touchend", ()=>{
    clearInterval(timers[id]);
  });

});

</script>

</body>
</html>
