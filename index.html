<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#menu {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}

#controller {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

button {
  width: 60px;
  height: 60px;
  margin: 5px;
  font-size: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<a-scene embedded arjs>

  <a-marker preset="hiro">

    <a-plane rotation="-90 0 0" width="2" height="2"
      material="color:#fff; opacity:0.2; wireframe:true">
    </a-plane>

    <a-entity id="model"
      position="0 0 0"
      scale="0.01 0.01 0.01"
      rotation="0 0 0">
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<div id="menu">
  <button onclick="loadModel()">project</button>
</div>

<div id="controller">
  <div>
    <button id="rotL">←</button>
    <button id="rotR">→</button>
  </div>
  <div>
    <button id="scaleUp">＋</button>
    <button id="scaleDown">－</button>
  </div>
</div>

<script>

let rotation = 0;
let scale = 0.01;

function loadModel() {
  const url = "https://amano-oss.github.io/AR_planess/assets/project.glb";
  document.getElementById("model").setAttribute("gltf-model", url);
}

// ===== コントローラーロジック =====

function holdAction(action) {
  let speed = 1;

  const interval = setInterval(() => {

    if(action === "rotL") rotation -= speed;
    if(action === "rotR") rotation += speed;

    if(action === "scaleUp") scale += 0.002 * speed;
    if(action === "scaleDown") scale -= 0.002 * speed;

    update();

    // 長押しで加速
    speed += 0.1;

  }, 50);

  return interval;
}

function update() {
  const model = document.getElementById("model");
  model.setAttribute("rotation", "0 " + rotation + " 0");
  model.setAttribute("scale", scale + " " + scale + " " + scale);
}

// ===== ボタンイベント =====

let timers = {};

["rotL","rotR","scaleUp","scaleDown"].forEach(id => {

  const btn = document.getElementById(id);

  btn.addEventListener("touchstart", e => {
    e.preventDefault();
    timers[id] = holdAction(id);
  });

  btn.addEventListener("touchend", () => {
    clearInterval(timers[id]);
  });

});

</script>

</body>
</html>
