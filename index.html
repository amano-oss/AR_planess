<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#ui {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
}

button {
  width:60px;
  height:60px;
  margin:3px;
  font-size:18px;
}
</style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-entity id="model"
    position="0 0 -1"
    scale="0.01 0.01 0.01"
    rotation="0 0 0">
  </a-entity>

  <a-camera></a-camera>

</a-scene>

<div id="ui">

  <button onclick="loadModel()">P</button><br>

  <!-- 移動 -->
  <button id="up">↑</button>
  <button id="down">↓</button><br>
  <button id="left">←</button>
  <button id="right">→</button><br>
  <button id="forward">前</button>
  <button id="back">後</button><br>

  <!-- 回転 -->
  <button id="rotL">⟲</button>
  <button id="rotR">⟳</button><br>

  <!-- 拡大縮小 -->
  <button id="scaleUp">＋</button>
  <button id="scaleDown">－</button>

</div>

<script>

let pos = {x:0, y:0, z:-1};
let rot = 0;
let scale = 0.01;

const model = document.getElementById("model");

// モデル読込
function loadModel(){
  model.setAttribute("gltf-model",
    "https://amano-oss.github.io/AR_planess/assets/project.glb"
  );
}

// 更新
function update(){
  model.setAttribute("position", `${pos.x} ${pos.y} ${pos.z}`);
  model.setAttribute("rotation", `0 ${rot} 0`);
  model.setAttribute("scale", `${scale} ${scale} ${scale}`);
}

// 長押し
function hold(action){
  let speed = 1;

  return setInterval(()=>{

    if(action==="up") pos.y += 0.01 * speed;
    if(action==="down") pos.y -= 0.01 * speed;

    if(action==="left") pos.x -= 0.01 * speed;
    if(action==="right") pos.x += 0.01 * speed;

    if(action==="forward") pos.z -= 0.02 * speed;
    if(action==="back") pos.z += 0.02 * speed;

    if(action==="rotL") rot -= speed;
    if(action==="rotR") rot += speed;

    if(action==="scaleUp") scale += 0.002 * speed;
    if(action==="scaleDown") scale -= 0.002 * speed;

    update();

    speed += 0.1;

  },50);
}

// イベント
let timers = {};

[
"up","down","left","right","forward","back",
"rotL","rotR","scaleUp","scaleDown"
].forEach(id=>{

  const btn = document.getElementById(id);

  btn.addEventListener("touchstart", e=>{
    e.preventDefault();
    timers[id] = hold(id);
  });

  btn.addEventListener("touchend", ()=>{
    clearInterval(timers[id]);
  });

});

</script>

</body>
</html>
