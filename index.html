<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#startUI {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:100;
  text-align:center;
  padding:20px;
}

#controls {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 10;
  display:none;
}

button {
  padding:12px;
  margin:5px;
  font-size:16px;
}
</style>
</head>

<body>

<!-- 初期ガイド -->
<div id="startUI">
  <h2>カメラを床に向けてください</h2>
  <p>高さ 約1mで安定させてください</p>
  <button onclick="start()">OK</button>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- 仮想床（最初は非表示） -->
  <a-entity id="floor" visible="false">

    <a-plane
      id="grid"
      rotation="-90 0 0"
      width="10"
      height="10"
      material="color:#ff00ff; opacity:0.3; wireframe:true">
    </a-plane>

    <a-entity id="model"
      position="0 0 0"
      scale="0.01 0.01 0.01">
    </a-entity>

  </a-entity>

  <a-entity id="cameraRig">
    <a-camera id="cam"></a-camera>
  </a-entity>

</a-scene>

<div id="controls">
  <button onclick="rotate(-5)">←</button>
  <button onclick="rotate(5)">→</button>
  <button onclick="scaleUp()">＋</button>
  <button onclick="scaleDown()">－</button>
</div>

<script>

let rotation = 0;
let scale = 0.01;

function start(){

  document.getElementById("startUI").style.display = "none";
  document.getElementById("controls").style.display = "block";

  const cam = document.getElementById("cam");
  const floor = document.getElementById("floor");

  // カメラ位置を取得
  const pos = cam.object3D.position.clone();
  const rot = cam.object3D.rotation.clone();

  // 床位置に固定（1m下に配置）
  floor.object3D.position.set(
    pos.x,
    pos.y - 1.0,
    pos.z - 1.5
  );

  floor.object3D.rotation.set(0, rot.y, 0);

  floor.setAttribute("visible", true);

  loadModel();
}

function loadModel(){
  const url = "https://amano-oss.github.io/AR_planess/assets/project.glb";
  document.getElementById("model").setAttribute("gltf-model", url);
}

function rotate(val){
  rotation += val;
  document.getElementById("model")
    .setAttribute("rotation", "0 " + rotation + " 0");
}

function scaleUp(){
  scale += 0.002;
  updateScale();
}

function scaleDown(){
  scale -= 0.002;
  updateScale();
}

function updateScale(){
  document.getElementById("model")
    .setAttribute("scale", scale + " " + scale + " " + scale);
}

</script>

</body>
</html>
