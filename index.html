<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; }

#ui {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

button {
  width:60px;
  height:60px;
  margin:5px;
}
</style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse">

  <!-- 起点 -->
  <a-entity id="origin" position="0 0 -1"></a-entity>

  <!-- ▼マーカー -->
  <a-cone id="marker"
    color="red"
    radius-bottom="0.05"
    height="0.1"
    visible="false">
  </a-cone>

  <!-- モデル -->
  <a-entity id="model"
    scale="0.01 0.01 0.01">
  </a-entity>

  <a-camera></a-camera>

</a-scene>

<div id="ui">
  <button onclick="loadModel()">project</button>
  <button onclick="fixOrigin()">固定</button>
  <br>
  <button id="rotL">←</button>
  <button id="rotR">→</button>
  <br>
  <button id="scaleUp">＋</button>
  <button id="scaleDown">－</button>
</div>

<script>

let rotation = 0;
let scale = 0.01;
let originFixed = false;

const scene = document.querySelector("a-scene");
const marker = document.getElementById("marker");
const origin = document.getElementById("origin");
const model = document.getElementById("model");

// ===== モデル呼び出し =====
function loadModel(){
  model.setAttribute("gltf-model",
    "https://amano-oss.github.io/AR_planess/assets/project.glb"
  );

  // 初期位置（カメラ前）
  const cam = document.querySelector("[camera]");
  const dir = new THREE.Vector3();
  cam.object3D.getWorldDirection(dir);

  const pos = cam.object3D.position.clone().add(dir.multiplyScalar(1));

  origin.setAttribute("position", pos);
  marker.setAttribute("position", pos);
  marker.setAttribute("visible", true);
}

// ===== タップで起点移動 =====
scene.addEventListener("click", () => {

  if(originFixed) return;

  const cam = document.querySelector("[camera]");
  const dir = new THREE.Vector3();
  cam.object3D.getWorldDirection(dir);

  const pos = cam.object3D.position.clone().add(dir.multiplyScalar(1));

  origin.setAttribute("position", pos);
  marker.setAttribute("position", pos);
});

// ===== 固定 =====
function fixOrigin(){
  originFixed = true;
  origin.appendChild(model);
  alert("起点固定");
}

// ===== コントローラ =====
function hold(action){
  let speed = 1;

  return setInterval(()=>{
    if(action==="rotL") rotation -= speed;
    if(action==="rotR") rotation += speed;
    if(action==="scaleUp") scale += 0.002 * speed;
    if(action==="scaleDown") scale -= 0.002 * speed;

    update();
    speed += 0.1;

  },50);
}

function update(){
  model.setAttribute("rotation","0 "+rotation+" 0");
  model.setAttribute("scale",scale+" "+scale+" "+scale);
}

let timers = {};

["rotL","rotR","scaleUp","scaleDown"].forEach(id=>{
  const btn = document.getElementById(id);

  btn.addEventListener("touchstart", e=>{
    e.preventDefault();
    timers[id] = hold(id);
  });

  btn.addEventListener("touchend", ()=>{
    clearInterval(timers[id]);
  });
});

</script>

</body>
</html>
